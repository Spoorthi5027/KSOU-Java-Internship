<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pricing Cards</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
    }

    .container {
      display: flex;
      gap: 30px;
    }

    .card {
      background: white;
      padding: 30px;
      width: 250px;
      border-radius: 15px;
      text-align: center;
      transition: all 0.3s ease;
      position: relative;
    }

    .card:hover {
      transform: translateY(-10px) scale(1.05);
      box-shadow: 0 15px 30px rgba(0,0,0,0.2);
    }

    .card h2 {
      margin-bottom: 10px;
    }

    .price {
      font-size: 28px;
      margin: 15px 0;
      color: #333;
    }

    .features {
      list-style: none;
      margin: 20px 0;
    }

    .features li {
      margin: 10px 0;
      color: #555;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 25px;
      background: #667eea;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #564fd8;
    }

    /* Highlighted Plan */
    .highlight {
      background: #667eea;
      color: white;
      transform: scale(1.1);
    }

    .highlight .price,
    .highlight li {
      color: white;
    }

    .highlight .btn {
      background: white;
      color: #667eea;
    }

    .highlight .btn:hover {
      background: #eee;
    }

    .badge {
      position: absolute;
      top: -10px;
      right: -10px;
      background: gold;
      color: black;
      padding: 5px 10px;
      border-radius: 10px;
      font-size: 12px;
    }

  </style>
</head>
<body>

<div class="container">

  <!-- Basic -->
  <div class="card">
    <h2>Basic</h2>
    <p class="price">₹199/mo</p>
    <ul class="features">
      <li>1 User</li>
      <li>5GB Storage</li>
      <li>Email Support</li>
    </ul>
    <button class="btn">Choose Plan</button>
  </div>

  <!-- Standard (Highlighted) -->
  <div class="card highlight">
    <div class="badge">Popular</div>
    <h2>Standard</h2>
    <p class="price">₹499/mo</p>
    <ul class="features">
      <li>5 Users</li>
      <li>50GB Storage</li>
      <li>Priority Support</li>
    </ul>
    <button class="btn">Choose Plan</button>
  </div>

  <!-- Premium -->
  <div class="card">
    <h2>Premium</h2>
    <p class="price">₹999/mo</p>
    <ul class="features">
      <li>Unlimited Users</li>
      <li>200GB Storage</li>
      <li>24/7 Support</li>
    </ul>
    <button class="btn">Choose Plan</button>
  </div>

</div>

</body>
</html>
